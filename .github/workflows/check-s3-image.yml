# push 시 MinIO 이미지 객체 진단 스크립트 자동 실행
# Repository Secrets: S3_ENDPOINT, S3_ACCESS_KEY, S3_SECRET_KEY, (선택) S3_BUCKET, S3_CHECK_OBJECT_KEY
name: Check S3 image object

on:
  push:
    branches: [main, master]

jobs:
  check-s3-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check_s3_image_object.py
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          if [ -n "${{ secrets.S3_CHECK_OBJECT_KEY }}" ]; then
            python3 PROJECT/scripts/check_s3_image_object.py "${{ secrets.S3_CHECK_OBJECT_KEY }}"
          else
            python3 PROJECT/scripts/check_s3_image_object.py || true
          fi
